<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ThinQ 시뮬레이터 설문조사</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; background: #f4f5f7; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { padding: 15px 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .title { font-size: 18px; font-weight: 700; color: #333; }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; }
    .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #555; background: #eee; transition: all 0.2s; border: none; font-size: 14px; }
    .tab:hover { background: #ddd; }
    .tab.active { background: #ff4d6d; color: #fff; box-shadow: 0 2px 8px rgba(255, 77, 109, 0.4); }
    .iframe-container { flex: 1; position: relative; }
    iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; display: none; }
    iframe.active { display: block; }
    /* 설문조사 패널 스타일 */
    .survey-panel { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 20px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; text-align: center; border: 1px solid rgba(255,255,255,0.5); width: 90%; max-width: 600px; transition: all 0.3s; }
    .survey-title { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 15px; }
    .survey-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .survey-btn { flex: 1; min-width: 140px; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; background: #fff; cursor: pointer; font-weight: 600; color: #555; transition: all 0.2s; font-size: 14px; }
    .survey-btn:hover { border-color: #ff4d6d; color: #ff4d6d; background: #fff0f3; transform: translateY(-2px); }
    .survey-btn.selected { background: #ff4d6d; color: #fff; border-color: #ff4d6d; box-shadow: 0 4px 12px rgba(255, 77, 109, 0.3); }
    .survey-thanks { margin-top: 15px; font-weight: 700; color: #ff4d6d; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">ThinQ AI 시뮬레이터 UI 평가 📊</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(1)">버전 1 (기본 가이드형)</button>
      <button class="tab" onclick="switchTab(2)">버전 2 (팝업 챗봇형)</button>
      <button class="tab" onclick="switchTab(3)">버전 3 (통합 대화형)</button>
    </div>
  </div>
  
  <div class="iframe-container">
    <iframe id="frame1" class="active"></iframe>
    <iframe id="frame2"></iframe>
    <iframe id="frame3"></iframe>
  </div>

  <!-- 설문조사 팝업 모듈 -->
  <div class="survey-panel">
    <div class="survey-title">어떤 버전이 가장 마음에 드시나요? 🤔</div>
    <div class="survey-buttons">
      <button class="survey-btn" onclick="submitVote(1)">1번 (기본 가이드형)</button>
      <button class="survey-btn" onclick="submitVote(2)">2번 (팝업 챗봇형)</button>
      <button class="survey-btn" onclick="submitVote(3)">3번 (통합 대화형)</button>
    </div>
    <div class="survey-thanks" id="surveyThanks" style="display:none;">
      소중한 의견 감사합니다! 🎉
    </div>
  </div>

  <script>
    // URL에서 apikey 파라미터 추출
    const urlParams = new URLSearchParams(window.location.search);
    const apikey = urlParams.get('apikey') || '';
    const qs = apikey ? '?apikey=' + encodeURIComponent(apikey) : '';

    // 각 iframe src 설정 (GitHub Pages 경로 기준)
    document.getElementById('frame1').src = 'index.html' + qs;
    document.getElementById('frame2').src = 'index_v2.html' + qs;
    document.getElementById('frame3').src = 'index_v3.html' + qs;

    function switchTab(num) {
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('active', i === (num - 1));
      });
      document.querySelectorAll('iframe').forEach((el, i) => {
        el.classList.toggle('active', i === (num - 1));
      });
    }

    // 설문조사 제출 함수
    function submitVote(version) {
      // 선택된 버튼 스타일 강조
      document.querySelectorAll('.survey-btn').forEach((btn, i) => {
        btn.classList.toggle('selected', i === (version - 1));
      });
      
      // 감사 메시지 표시
      document.getElementById('surveyThanks').style.display = 'block';
      
      // 콘솔에 기록 (추후 구글 폼이나 별도 DB 연동 시 이 부분에 코드를 추가하면 됩니다)
      console.log('제출된 의견:', version, '번 버전');
    }
  </script>
</body>
</html>
